<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos | Mi Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .project-img { height: 300px; object-fit: cover; border-radius: 15px; width: 100%; }
        .bg-custom { background-color: #f8f9fa; }
          body {
        /* Gradiente más moderno sobre tu imagen de fondo */
        background-image: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(56, 189, 248, 0.4)), url('imagenes/Fondo.jfif');
        background-size: cover;
        background-attachment: fixed;
        font-family: 'Poppins', sans-serif; /* Tipografía personalizada */
    }

    .nav-masthead .nav-link {
        color: #e2e8f0;
        transition: 0.3s;
    }

    /* Cambio de color del elemento activo y hover */
    .nav-masthead .active {
        color: #38bdf8 !important;
        border-bottom-color: #38bdf8 !important;
    }

    .profile-img {
        width: 160px;
        height: 160px;
        object-fit: cover;
        border: 5px solid rgba(56, 189, 248, 0.5); /* Borde translúcido */
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
    }

    .btn-info {
        background-color: #38bdf8;
        border: none;
        color: #0f172a;
        transition: transform 0.2s;
    }

    .btn-info:hover {
        transform: scale(1.05); /* Efecto de pulso al pasar el mouse */
        background-color: #0ea5e9;
    }

    </style>
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Mi Portfolio</a>

            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="proyectos.html">Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="position-relative overflow-hidden p-3 p-md-5 m-md-3 text-center bg-custom">
        <div class="col-md-6 p-lg-5 mx-auto my-3">
            <h1 class="display-4 fw-bold">Mis Proyectos</h1>
            <h3 class="fw-normal text-muted mb-3">Una selección de mis trabajos recientes.</h3>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row g-4">

                    <p class="lead mb-4">Presentación sobre el impacto de la IA en la educación moderna.</p>
                    <img src="imagenes/Ted.jfif" alt="Charla TED" class="project-img mt-auto shadow-sm">
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="bg-primary text-white p-4 text-center rounded-4 shadow h-100 d-flex flex-column">
                    <h2 class="display-6">App de Gestión</h2>
                    <p class="lead mb-4">Diseño de interfaz para una aplicación de gestión de tareas diarias.</p>
                    <img src="imagenes/proyecto2.jfif" alt="App de Gestión" class="project-img mt-auto shadow-sm">
                </div>
            </div>
