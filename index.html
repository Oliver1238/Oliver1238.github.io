<!DOCTYPE html>
<html lang="es" class="h-100">
<head>

    <title>Inicio | Mi Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
 <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

    body {
        /* Gradiente más moderno sobre tu imagen de fondo */
        background-image: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(56, 189, 248, 0.4)), url('imagenes/Fondo.jfif');
        background-size: cover;
        background-attachment: fixed;
        font-family: 'Poppins', sans-serif; /* Tipografía personalizada */
    }

    .nav-masthead .nav-link {
        color: #e2e8f0;
        transition: 0.3s;
    }

    /* Cambio de color del elemento activo y hover */
    .nav-masthead .active {
        color: #38bdf8 !important;
        border-bottom-color: #38bdf8 !important;
    }

    .profile-img {
        width: 160px;
        height: 160px;
        object-fit: cover;
        border: 5px solid rgba(56, 189, 248, 0.5); /* Borde translúcido */
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
    }

    .btn-info {
        background-color: #38bdf8;
        border: none;
        color: #0f172a;
        transition: transform 0.2s;
    }

    .btn-info:hover {
        transform: scale(1.05); /* Efecto de pulso al pasar el mouse */
        background-color: #0ea5e9;
    }
</style>
</head>
<body class="d-flex h-100 text-center text-white">
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
        
        <header class="mb-auto">

                    <a class="nav-link fw-bold py-1 px-0" href="blog.html">Blog</a>
                </nav>

             <div class="mt-4 mb-5">
    <h5 class="text-uppercase fw-light mb-3" style="letter-spacing: 2px;">Tecnologías</h5>

</div>

            <p class="lead">
